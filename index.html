<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PakMate AI</title>

<style>
body{
margin:0;
background:#0d1117;
font-family:Arial,sans-serif;
color:white;
}

header{
background:#00c853;
padding:18px;
text-align:center;
font-size:28px;
font-weight:bold;
}

#chat{
height:70vh;
overflow-y:auto;
padding:15px;
}

.msg{
padding:12px;
margin:10px 0;
border-radius:12px;
max-width:80%;
}

.ai{
background:#222;
}

.user{
background:#00c853;
margin-left:auto;
text-align:right;
}

.bottom{
display:flex;
padding:10px;
background:#161b22;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
}

button{
margin-left:10px;
padding:12px 20px;
border:none;
border-radius:10px;
background:#00c853;
color:white;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<header>🤖 PakMate AI</header>

<div id="chat">
<div class="msg ai">👋 Assalam-o-Alaikum! Main PakMate AI hoon.</div>
</div>

<div class="bottom">
<input id="message" placeholder="Type your message...">
<button onclick="send()">Send</button>
</div>

<script>
function send(){

let input=document.getElementById("message");

if(input.value.trim()=="") return;

let chat=document.getElementById("chat");

chat.innerHTML+=`
<div class="msg user">${input.value}</div>
`;

chat.innerHTML+=`
<div class="msg ai">🤖 AI Reply Coming Soon...</div>
`;

input.value="";

chat.scrollTop=chat.scrollHeight;

}
</script>

</body>
</html>

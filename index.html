<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PakMate AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d1117;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

header{
background:#00b894;
padding:18px;
text-align:center;
font-size:28px;
font-weight:bold;
}

#chat{
flex:1;
overflow-y:auto;
padding:15px;
}

.msg{
max-width:80%;
padding:12px;
margin:10px;
border-radius:12px;
font-size:16px;
}

.user{
background:#00b894;
margin-left:auto;
text-align:right;
}

.ai{
background:#222;
margin-right:auto;  
}

.bottom{
display:flex;
padding:10px;
background:#161b22;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
outline:none;
}

button{
margin-left:10px;
padding:12px 20px;
background:#00b894;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<header>🤖 PakMate AI</header>

<div id="chat">
<div class="msg ai">
👋 Assalam-o-Alaikum! Main PakMate AI hoon.
</div>
</div>

<div class="bottom">
<input id="text" placeholder="Type your message...">
<button onclick="sendMessage()">Send</button>
</div>

<script>
function sendMessage(){

let input=document.getElementById("text");
let chat=document.getElementById("chat");

if(input.value=="") return;

chat.innerHTML+=
'<div class="msg user">'+input.value+'</div>';

setTimeout(function(){

chat.innerHTML+=
'<div class="msg ai">🤖 AI Reply Coming Soon...</div>';

chat.scrollTop=chat.scrollHeight;

},500);

input.value="";

}
</script>

</body>
</html>
